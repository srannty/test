<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>只为你 ❤️</title>
  <style> 
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: white;
      position: relative;
    }

    /* 背景光晕 */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,105,180,0.3) 0%, transparent 70%),
                  radial-gradient(circle at bottom right, rgba(170, 85, 255,0.2) 0%, transparent 60%),
                  radial-gradient(circle at top left, rgba(255, 200, 200, 0.15) 0%, transparent 70%);
      animation: glowMove 20s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes glowMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-10%, 10%); }
    }

    .content {
      text-align: center;
      z-index: 10;
      padding: 30px;
      max-width: 90vw;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 25px;
      opacity: 0;
      animation: fadeIn 2s forwards 1s, heartbeat 1.8s infinite 3s;
      text-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
    }

    p {
      font-size: 1.4rem;
      line-height: 1.7;
      opacity: 0;
      animation: fadeIn 2s forwards 2.5s;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  
  <div class="content">
    <h1>我只属于你 ❤️</h1>
    <p>亲爱的xzh宝宝跟你在一起的那一刻起，<br>我的世界便有了光。<br>余生，请多指教。</p>
  </div>

  <script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 鼠标位置（用于互动）
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // 粒子类
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        this.weight = Math.random() * 1 + 0.5;
        this.directionX = (Math.random() - 0.5) * 4;
        this.directionY = (Math.random() - 0.5) * 4;
        this.color = `hsl(${Math.random() * 20 + 340}, 80%, ${Math.random() * 30 + 60}%)`;
        this.life = 200 + Math.random() * 100;
        this.maxLife = this.life;
        this.angle = Math.random() * Math.PI * 2;
        this.va = (Math.random() - 0.5) * 0.1; // 角速度
      }

      update() {
        this.x += this.directionX;
        this.y += this.directionY;
        this.directionY += 0.05; // 重力
        this.life--;
        this.angle += this.va;

        // 轻微向鼠标靠拢（远距离）
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          this.x += dx * 0.005;
          this.y += dy * 0.005;
        }
      }

      draw() {
        const alpha = this.life / this.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;

        // 绘制旋转爱心
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.scale(this.size / 10, this.size / 10);

        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.bezierCurveTo(-15, -30, -30, 0, 0, 20);
        ctx.bezierCurveTo(30, 0, 15, -30, 0, -10);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }
    }

    let particles = [];
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // 初始爆炸：生成大量粒子从中心飞出
    for (let i = 0; i < 300; i++) {
      setTimeout(() => {
        if (particles.length < 300) {
          particles.push(new Particle(centerX, centerY));
        }
      }, i * 8); // 分批生成，形成爆炸延展感
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 添加模糊拖尾效果（模拟残影）
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].life <= 0) {
          particles.splice(i, 1);
          // 补充新粒子（保持活跃）
          if (Math.random() > 0.7) {
            particles.push(new Particle(
              Math.random() * canvas.width,
              -10
            ));
          }
        }
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>

</html>
